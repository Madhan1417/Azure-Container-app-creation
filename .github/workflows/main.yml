name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  RESOURCE_GROUP: madhanait-rg
  LOCATION: southindia

  ACR_NAME: madhanacr
  ACR_LOGIN_SERVER: madhanacr.azurecr.io

  FRONTEND_APP: frontend
  BACKEND_APP: backend
  CONTAINERAPPS_ENV: madhan-env

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # -----------------------------
    # 1. Checkout code
    # -----------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -----------------------------
    # 2. Azure Login (OIDC)
    # -----------------------------
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # -----------------------------
    # 3. Login to ACR
    # -----------------------------
    - name: Login to ACR
      run: |
        az acr login --name $ACR_NAME

    # -----------------------------
    # 4. Get Backend FQDN 
    # -----------------------------
    - name: Get Backend URL
      run: |
        BACKEND_URL=$(az containerapp show \
          --name $BACKEND_APP \
          --resource-group $RESOURCE_GROUP \
          --query properties.configuration.ingress.fqdn \
          -o tsv)

        echo "BACKEND_URL=https://$BACKEND_URL" >> $GITHUB_ENV

    # -----------------------------
    # 5. Build Backend Image
    # -----------------------------
    - name: Build Backend Image
      run: |
        docker build \
          -t $ACR_LOGIN_SERVER/backend:${{ github.sha }} \
          ./backend

    # -----------------------------
    # 6. Build Frontend Image (IMPORTANT inject backend URL)
    # -----------------------------
    - name: Build Frontend Image
      run: |
        docker build \
          --build-arg VITE_API_URL=$BACKEND_URL \
          -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
          ./frontend

    # -----------------------------
    # 7. Push Images to ACR
    # -----------------------------
    - name: Push Images
      run: |
        docker push $ACR_LOGIN_SERVER/backend:${{ github.sha }}
        docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

    # -----------------------------
    # 8. Deploy Backend (UPDATE only)
    # -----------------------------
    - name: Update Backend Container App
      run: |
        az containerapp update \
          --name $BACKEND_APP \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_LOGIN_SERVER/backend:${{ github.sha }}

    # -----------------------------
    # 9. Deploy Frontend (UPDATE only)
    # -----------------------------
    - name: Update Frontend Container App
      run: |
        az containerapp update \
          --name $FRONTEND_APP \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

    # -----------------------------
    # 10. Update Frontend ENV (backend URL)
    # -----------------------------
    - name: Inject Backend URL into Frontend App
      run: |
        az containerapp update \
          --name $FRONTEND_APP \
          --resource-group $RESOURCE_GROUP \
          --set-env-vars \
          VITE_API_URL=$BACKEND_URL

    # -----------------------------
    # DONE
    # -----------------------------
    - name: Deployment Complete
      run: echo "Deployment successful to Azure Container Apps"
