version: '3.9'

services:

  backend:
    build:
      context: ./backend
    container_name: rwai-backend
    ports:
      - "5000:5000"
    networks:
      - rwai-network

  frontend:
    build:
      context: ./frontend
    container_name: rwai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:5000
    networks:
      - rwai-network

networks:
  rwai-network:
    driver: bridge